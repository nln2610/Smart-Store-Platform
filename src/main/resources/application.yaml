spring:
  application:
    name: smart-store-platform

  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5        # Supabase free tier giới hạn connection
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update            # Tự tạo/cập nhật bảng khi chạy - OK cho dev
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false           # ⚠️ Quan trọng: tắt để tránh lazy loading bug

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000       # 24 giờ
    refresh-expiration-ms: 604800000  # 7 ngày

  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-3.0-flash

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  show-actuator: false

profiles:
  active: ${SPRING_PROFILES_ACTIVE:dev}
  # ⭐ Mặc định dùng dev, Render sẽ set SPRING_PROFILES_ACTIVE=prod